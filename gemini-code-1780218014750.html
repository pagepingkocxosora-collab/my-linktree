<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <style>
        /* 1. อนิเมชันพื้นหลังไล่เฉดสี */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #fdf2f8, #fce7f3, #fbcfe8);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. อนิเมชันดาวตก */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: shoot 5s linear infinite;
        }

        @keyframes shoot {
            0% { transform: translateY(0) translateX(0); opacity: 1; }
            50% { transform: translateY(500px) translateX(-500px); opacity: 0; }
            100% { transform: translateY(0) translateX(0); opacity: 0; }
        }

        /* ส่วนเนื้อหา */
        .container { z-index: 1; width: 90%; max-width: 400px; text-align: center; }
        .profile-name { color: #be185d; font-size: 28px; margin-bottom: 20px; }
        .link-btn {
            display: block; width: 100%; padding: 18px; margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid #fbcfe8;
            border-radius: 20px;
            text-decoration: none;
            color: #be185d;
            font-weight: bold;
            transition: 0.3s;
        }
        .link-btn:hover { background: #be185d; color: white; transform: translateY(-5px); }
    </style>
</head>
<body>

    <!-- ดาวตก -->
    <div class="star" style="top: 10%; left: 80%;"></div>
    <div class="star" style="top: 30%; left: 20%; animation-delay: 2s;"></div>
    <div class="star" style="top: 50%; left: 60%; animation-delay: 4s;"></div>

    <div class="container">
        <h1 class="profile-name">💖 My Health Hub</h1>
        <p style="color: #831843;">ยินดีต้อนรับสู่พื้นที่ดูแลสุขภาพของฉันครับ</p>
        
        <a href="https://sites.google.com/view/pingbmr" class="link-btn">✨ คำนวณ BMR & โภชนาการ</a>
        <a href="#" class="link-btn">📷 Instagram</a>
        <a href="#" class="link-btn">🎵 TikTok</a>
        <a href="#" class="link-btn">💬 Line Contact</a>
    </div>

</body>
</html>
